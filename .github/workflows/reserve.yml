name: Reserve Pickleball Court

on:
  workflow_dispatch:       # manual trigger only (schedule disabled — use launchd or VPS cron instead)

jobs:
  reserve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Write config
        run: echo '${{ secrets.CONFIG_JSON }}' > config.json

      - name: Run reservation script
        run: python reserve.py --auto
